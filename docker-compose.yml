services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-teamatrix}
      POSTGRES_USER: ${POSTGRES_USER:-teamatrix}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-12345678K}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-teamatrix}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  web:
    build: .
    restart: unless-stopped
    environment:
      - DJANGO_SETTINGS_MODULE=teamatrix.settings.dev
      - POSTGRES_DB=${POSTGRES_DB:-teamatrix}
      - POSTGRES_USER=${POSTGRES_USER:-teamatrix}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-12345678K}
      - DB_HOST=db
      - DB_PORT=5432
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-me-in-production}
    volumes:
      - .:/app
      - ./media:/app/media
      - static_files:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  nginx:
    build: ./nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - static_files:/app/staticfiles:ro
      - ./media:/app/media:ro
    depends_on:
      - web
    networks:
      - app-network

volumes:
  postgres_data:
  static_files:

networks:
  app-network:
    driver: bridge
